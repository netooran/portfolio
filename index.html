<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <script src="https://cdn.jsdelivr.net/npm/vue"></script>
    <link
      href="https://fonts.googleapis.com/css?family=Source+Code+Pro&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.7.2/css/all.css"
      integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="index.css" />
    <title>Sarath's Portfolio</title>
  </head>
  <body>
    <div id="app">
      <main>
        <section class="home active">
          <h1 tabindex="1">Home</h1>
          <div class="content">
            <h1>
              Hi, I'm <br /> <b> {{name.first}} <br /> {{name.last}}</b>
            </h1>
            <p>{{description}}</p>
            <div class="social">
              <a
                v-for="(social, index) in socials"
                :key="index"
                :href="social.url"
                target="_blank"
                :class="social.icon"
              ></a>
            </div>
          </div>
        </section>

        <section class="projects">
          <h1 tabindex="2">Projects</h1>
          <div class="content">
            <img class="wip" src="images/inprogress.svg" alt="Coming Soon..." />
            <h4>Projects page is under construction</h4>
          </div>
        </section>

        <section class="gallery">
          <h1 tabindex="3">Gallery</h1>
          <div class="content">
            <img class="wip" src="images/inprogress.svg" alt="Coming Soon..." />
            <h4>Gallery is under construction</h4>
          </div>
        </section>
      </main>
    </div>
    <script src="index.js"></script>
  </body>
</html>
